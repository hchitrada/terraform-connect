<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Any Company Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 3rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #e94560;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #a8a8b3;
            margin-bottom: 3rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a8a8b3;
            margin-bottom: 0.5rem;
        }
        .phone {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4ec5f1;
        }
        .card.prod .phone {
            color: #e94560;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .badge.dev { background: #1b4332; color: #95d5b2; }
        .badge.prod { background: #4a1025; color: #f4a0b5; }
        footer {
            margin-top: 2rem;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Any Company Support</h1>
        <p class="subtitle">Priority Support Contact Numbers</p>

        <div class="card">
            <span class="badge dev">Development</span>
            <h2>Dev Support Line</h2>
            <p class="phone">{{DEV_PHONE}}</p>
        </div>

        <div class="card prod">
            <span class="badge prod">Production</span>
            <h2>Prod Support Line</h2>
            <p class="phone">{{PROD_PHONE}}</p>
        </div>

        <footer>
            <p>Powered by Amazon Connect | Deployed via AWS CodePipeline</p>
        </footer>
    </div>
</body>
</html>
