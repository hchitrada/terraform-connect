version: 0.2
env:
  variables:
    WEBSITE_BUCKET: ""
phases:
  install:
    commands:
      - yum install -y yum-utils
      - yum-config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
      - yum install -y terraform
  build:
    commands:
      - cd application
      - terraform init
      - terraform workspace select dev || terraform workspace new dev
      - export DEV_NUMBER=$(terraform output -raw contact_number 2>/dev/null || echo "Deploying...")
      - cd ..
      - sed -e "s|{{DEV_PHONE}}|${DEV_NUMBER}|g" -e "s|{{PROD_PHONE}}|Pending approval...|g" website/index.html > /tmp/index.html
      - aws s3 cp /tmp/index.html s3://${WEBSITE_BUCKET}/index.html --content-type "text/html"
